# TODO: https://docs.drone.io/server/provider/github/

services:
  postgres:
    image: postgres
    environment:
      POSTGRES_USER: proclogic
      POSTGRES_PASSWORD: proclogic
      POSTGRES_DB: proclogic
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proclogic"]
      interval: 30s
      timeout: 10s
      retries: 5
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: "admin@localhost.be"
      PGADMIN_DEFAULT_PASSWORD: "admin"
    ports:
      - "8002:8002"
